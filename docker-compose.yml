services:
  mongodb:
    image: mongo:7
    container_name: vectora-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - vectora-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: deepan0202/vectora-backend:v1
    container_name: vectora-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URI: mongodb://mongodb:27017/vectora
      PORT: 5000
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "5000:5000"
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - vectora-net

  frontend:
    build:
      context: ./fr
      dockerfile: Dockerfile
    image: deepan0202/vectora-frontend:v1
    container_name: vectora-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - vectora-net

volumes:
  mongodb_data:

networks:
  vectora-net:
    name: vectora-net
