apiVersion: v1
kind: Service
metadata:
  name: vectora-mongodb
  namespace: vectora
spec:
  selector:
    app: vectora-mongodb
  ports:
    - name: mongo
      port: 27017
      targetPort: 27017
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vectora-mongodb
  namespace: vectora
spec:
  serviceName: vectora-mongodb
  replicas: 1
  selector:
    matchLabels:
      app: vectora-mongodb
  template:
    metadata:
      labels:
        app: vectora-mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          args: ["--bind_ip_all"]
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
          readinessProbe:
            exec:
              command: ["mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 30
            periodSeconds: 30
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
